name: CI

on:
  push:
    branches:
      - main
      - track/**
  pull_request:
  workflow_dispatch:

jobs:
  lib-check:
    name: Check libraries
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/lib-check.yaml@main
    secrets: inherit

  lint:
    name: Lint Check
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python3 -m pipx install tox
      - name: Lint code
        run: tox -e lint

  unit:
    name: Unit Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python3 -m pipx install tox
      - name: Run unit tests
        run: tox -e unit

  terraform-checks:
    name: Terraform
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/terraform-checks.yaml@main
    with:
      charm-path: .
      apply: false

  build:
    needs:
      - lib-check
      - lint
      - unit
      - terraform-checks
    strategy:
      matrix:
        charm:
          - .
          - tests/integration/manifests-tester
          - tests/integration/manifests-tester-no-secret
    name: Build charm | ${{ matrix.charm }}
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      path-to-charm-directory: ${{ matrix.charm }}
      cache: true
    permissions:
      actions: read
      contents: read

  integration:
    strategy:
      fail-fast: false
      matrix:
        tox-env-istio-mode:
          - integration
          - integration-ambient
        tox-env-type:
          - charm
          - upgrade-happy-path
          - upgrade-erronous-path
        exclude:
          - tox-env-istio-mode: integration-ambient
            tox-env-type: upgrade-happy-path
          - tox-env-istio-mode: integration-ambient
            tox-env-type: upgrade-erronous-path
    name: Integration Test (${{ matrix.tox-env-type }} | ${{ matrix.tox-env-istio-mode }})
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pipx install tox

      - name: Setup environment
        run: |
          sudo apt-get remove -y docker-ce docker-ce-cli containerd.io
          sudo rm -rf /run/containerd
          sudo snap install concierge --classic
          sudo concierge prepare --trace

      - name: Download packed charm(s)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true

      - name: Run integration tests
        run: |
          CHARM_PATH_ARGS=""
          for charm in *.charm; do
            [ -f "$charm" ] && CHARM_PATH_ARGS="$CHARM_PATH_ARGS --charm-path=$charm"
          done
          tox -vve ${{ matrix.tox-env-istio-mode }}-${{ matrix.tox-env-type }} -- $CHARM_PATH_ARGS

      # On failure, capture debugging resources
      - name: Get all
        run: kubectl get all -A
        if: failure()

      - name: Get juju status
        run: juju status
        if: failure()

      - name: Get workload logs
        run: kubectl logs --tail 100 -ntesting -lapp.kubernetes.io/name=resource-dispatcher -c resource-dispatcher
        if: failure()

      - name: Get operator logs
        run: kubectl logs --tail 100 -ntesting -lapp.kubernetes.io/name=resource-dispatcher -c charm
        if: failure()

  release-pr-preview:
    name: Release PR preview
    if: github.event_name == 'pull_request'
    needs:
      - build
    uses: canonical/data-platform-workflows/.github/workflows/release_charm.yaml@v49.0.1
    with:
      channel: latest/edge
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
      create-github-release: false
      dry-run: true
    permissions:
      contents: write
