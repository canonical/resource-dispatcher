name: Release to latest/edge

on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      actions: read
      contents: read

  build:
    name: Build charm
    needs:
      - ci
    strategy:
      matrix:
        charm:
          - .
          - tests/integration/manifests-tester
          - tests/integration/manifests-tester-no-secret
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      path-to-charm-directory: ${{ matrix.charm }}
      cache: true
    permissions:
      actions: read
      contents: read

  release:
    name: Release to latest/edge
    needs:
      - ci
      - build
    uses: canonical/data-platform-workflows/.github/workflows/release_charm.yaml@v49.0.1
    with:
      channel: latest/edge
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
      create-github-release: false
    secrets:
      charmhub-token: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
    permissions:
      contents: write
